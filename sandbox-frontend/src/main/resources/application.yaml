spring:
  application:
    name: sandbox-frontend

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.altimetrik: INFO

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  preview:
    root: ${APP_PREVIEW_ROOT:}
  workspace:
    idle-timeout: ${APP_WORKSPACE_IDLE_TIMEOUT:PT30M}
    cleanup-interval-ms: ${APP_WORKSPACE_CLEANUP_INTERVAL_MS:60000}
