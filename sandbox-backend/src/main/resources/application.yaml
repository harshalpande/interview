spring:
  application:
    name: sandbox-backend

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.altimetrik: INFO

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
