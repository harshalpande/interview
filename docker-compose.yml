

services:
  sandbox-frontend:
    build:
      context: .
      dockerfile: sandbox-frontend/Dockerfile
    container_name: sandbox-frontend
    ports:
      - "8083:8080"
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
      - LOGGING_LEVEL_COM_ALTIMETRIK=DEBUG
    networks:
      - java-compiler-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  sandbox-backend:
    build:
      context: .
      dockerfile: sandbox-backend/Dockerfile
    container_name: sandbox-backend
    ports:
      - "8082:8080"
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
      - LOGGING_LEVEL_COM_ALTIMETRIK=DEBUG
    volumes:
      - /tmp:/tmp
    networks:
      - java-compiler-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: java-compiler-backend
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SANDBOX_BASE_URL=http://sandbox-backend:8080/api
      - SANDBOX_FRONTEND_BASE_URL=http://sandbox-frontend:8080/api
      - SANDBOX_FRONTEND_PUBLIC_BASE_URL=http://localhost:8083/api
      - JAVA_OPTS=-Xmx512m -Xms256m
      - LOGGING_LEVEL_COM_ALTIMETRIK=DEBUG
    volumes:
      - "${BINDMOUNT_DIR:-C:/Users/hpande/Documents/workspace/bindmount}:/data" # Persistent H2 DB (Windows bind mount)
    networks:
      - java-compiler-network
    depends_on:
      - sandbox-backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: java-compiler-frontend
    ports:
      - "3000:3000"

    networks:
      - java-compiler-network
    depends_on:
      - sandbox-backend
      - backend
    restart: unless-stopped

networks:
  java-compiler-network:
    driver: bridge
