

services:
  sandbox-frontend:
    build:
      context: .
      dockerfile: sandbox-frontend/Dockerfile
    container_name: sandbox-frontend
    ports:
      - "8083:8080"
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
      - LOGGING_LEVEL_COM_ALTIMETRIK=DEBUG
    networks:
      - java-compiler-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  sandbox-backend:
    build:
      context: .
      dockerfile: sandbox-backend/Dockerfile
    container_name: sandbox-backend
    ports:
      - "8082:8080"
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
      - LOGGING_LEVEL_COM_ALTIMETRIK=DEBUG
    volumes:
      - /tmp:/tmp
    networks:
      - java-compiler-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: java-compiler-backend
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SANDBOX_BASE_URL=http://sandbox-backend:8080/api
      - SANDBOX_FRONTEND_BASE_URL=http://sandbox-frontend:8080/api
      - SANDBOX_FRONTEND_PUBLIC_BASE_URL=http://localhost:8083/api
      - APP_PUBLIC_ORIGIN=${APP_PUBLIC_ORIGIN:-http://localhost:3000}
      - APP_EMAIL_MODE=${APP_EMAIL_MODE:-logging}
      - APP_EMAIL_PROVIDER=${APP_EMAIL_PROVIDER:-postmark}
      - APP_EMAIL_FROM_ADDRESS=${APP_EMAIL_FROM_ADDRESS:-no-reply@example.com}
      - APP_EMAIL_FROM_NAME=${APP_EMAIL_FROM_NAME:-Interview Platform}
      - APP_EMAIL_SUBJECT_PREFIX=${APP_EMAIL_SUBJECT_PREFIX:-DEV}
      - SPRING_MAIL_HOST=${SPRING_MAIL_HOST:-}
      - SPRING_MAIL_PORT=${SPRING_MAIL_PORT:-2525}
      - SPRING_MAIL_USERNAME=${SPRING_MAIL_USERNAME:-}
      - SPRING_MAIL_PASSWORD=${SPRING_MAIL_PASSWORD:-}
      - SPRING_MAIL_SMTP_AUTH=${SPRING_MAIL_SMTP_AUTH:-true}
      - SPRING_MAIL_SMTP_STARTTLS_ENABLE=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:-true}
      - SPRING_MAIL_SMTP_STARTTLS_REQUIRED=${SPRING_MAIL_SMTP_STARTTLS_REQUIRED:-false}
      - SPRING_MAIL_SMTP_SSL_ENABLE=${SPRING_MAIL_SMTP_SSL_ENABLE:-false}
      - POSTMARK_APP_EMAIL_FROM_ADDRESS=${POSTMARK_APP_EMAIL_FROM_ADDRESS:-${APP_EMAIL_FROM_ADDRESS:-no-reply@example.com}}
      - POSTMARK_APP_EMAIL_FROM_NAME=${POSTMARK_APP_EMAIL_FROM_NAME:-${APP_EMAIL_FROM_NAME:-Interview Platform}}
      - POSTMARK_SPRING_MAIL_HOST=${POSTMARK_SPRING_MAIL_HOST:-smtp.postmarkapp.com}
      - POSTMARK_SPRING_MAIL_PORT=${POSTMARK_SPRING_MAIL_PORT:-2525}
      - POSTMARK_SPRING_MAIL_USERNAME=${POSTMARK_SPRING_MAIL_USERNAME:-}
      - POSTMARK_SPRING_MAIL_PASSWORD=${POSTMARK_SPRING_MAIL_PASSWORD:-}
      - MAILGUN_APP_EMAIL_FROM_ADDRESS=${MAILGUN_APP_EMAIL_FROM_ADDRESS:-${APP_EMAIL_FROM_ADDRESS:-no-reply@example.com}}
      - MAILGUN_APP_EMAIL_FROM_NAME=${MAILGUN_APP_EMAIL_FROM_NAME:-${APP_EMAIL_FROM_NAME:-Interview Platform}}
      - MAILGUN_SPRING_MAIL_HOST=${MAILGUN_SPRING_MAIL_HOST:-smtp.mailgun.org}
      - MAILGUN_SPRING_MAIL_PORT=${MAILGUN_SPRING_MAIL_PORT:-587}
      - MAILGUN_SPRING_MAIL_USERNAME=${MAILGUN_SPRING_MAIL_USERNAME:-}
      - MAILGUN_SPRING_MAIL_PASSWORD=${MAILGUN_SPRING_MAIL_PASSWORD:-}
      - MANAGEMENT_HEALTH_MAIL_ENABLED=false
      - JAVA_OPTS=-Xmx512m -Xms256m
      - LOGGING_LEVEL_COM_ALTIMETRIK=DEBUG
    volumes:
      - "${BINDMOUNT_DIR:-C:/Users/hpande/Documents/workspace/bindmount}:/data" # Persistent H2 DB (Windows bind mount)
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - java-compiler-network
    depends_on:
      - sandbox-backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: java-compiler-frontend
    ports:
      - "3000:3000"

    networks:
      - java-compiler-network
    depends_on:
      - sandbox-backend
      - backend
    restart: unless-stopped

networks:
  java-compiler-network:
    driver: bridge
