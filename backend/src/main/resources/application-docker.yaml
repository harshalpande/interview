spring:
  datasource:
    # Persist data across container restarts via docker volume mount (/data)
    # Files created: /data/interviewdb.mv.db (and related)
    url: jdbc:h2:file:/data/interviewdb;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

app:
  storage:
    root: ${APP_STORAGE_PATH:/data}
