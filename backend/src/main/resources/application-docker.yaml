spring:
  datasource:
    # Persist data across container restarts via docker volume mount (/data)
    # Files created: /data/interviewdb.mv.db (and related)
    url: jdbc:h2:file:/data/interviewdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

app:
  email:
    subject-prefix: ${APP_EMAIL_SUBJECT_PREFIX:DEV}
  public-origin: ${APP_PUBLIC_ORIGIN:http://localhost:3000}
  storage:
    root: ${APP_STORAGE_PATH:/data}

management:
  health:
    mail:
      enabled: false
