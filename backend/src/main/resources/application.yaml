spring:
  config:
    import: optional:file:../.env[.properties],optional:file:.env[.properties],optional:file:../backend/.env.local[.properties],optional:file:.env.local[.properties]
  application:
    name: java-compiler-backend
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:2525}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          connectiontimeout: ${SPRING_MAIL_SMTP_CONNECTION_TIMEOUT_MS:30000}
          timeout: ${SPRING_MAIL_SMTP_TIMEOUT_MS:30000}
          writetimeout: ${SPRING_MAIL_SMTP_WRITE_TIMEOUT_MS:30000}
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
            required: ${SPRING_MAIL_SMTP_STARTTLS_REQUIRED:false}
          ssl:
            enable: ${SPRING_MAIL_SMTP_SSL_ENABLE:false}
  datasource:
    # Default (local): file-based H2 on the Windows bind-mount path so data persists
    # Override via env var `H2_DB_PATH` if needed.
    url: jdbc:h2:file:${H2_DB_PATH:C:/Users/hpande/Documents/workspace/bindmount/interviewdb};AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  jackson:
    time-zone: UTC
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  web:
    cors:
      allowed-origins: "http://localhost:3000,http://localhost:8081"
      allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
      allowed-headers: "*"
      allow-credentials: true

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.altimetrik: INFO

app:
  email:
    mode: ${APP_EMAIL_MODE:logging}
    provider: ${APP_EMAIL_PROVIDER:postmark}
    from-address: ${APP_EMAIL_FROM_ADDRESS:no-reply@example.com}
    from-name: ${APP_EMAIL_FROM_NAME:Interview Platform}
    subject-prefix: ${APP_EMAIL_SUBJECT_PREFIX:LOCAL}
    providers:
      postmark:
        from-address: ${POSTMARK_APP_EMAIL_FROM_ADDRESS:${APP_EMAIL_FROM_ADDRESS:no-reply@example.com}}
        from-name: ${POSTMARK_APP_EMAIL_FROM_NAME:${APP_EMAIL_FROM_NAME:Interview Platform}}
        host: ${POSTMARK_SPRING_MAIL_HOST:${SPRING_MAIL_HOST:}}
        port: ${POSTMARK_SPRING_MAIL_PORT:${SPRING_MAIL_PORT:2525}}
        username: ${POSTMARK_SPRING_MAIL_USERNAME:${SPRING_MAIL_USERNAME:}}
        password: ${POSTMARK_SPRING_MAIL_PASSWORD:${SPRING_MAIL_PASSWORD:}}
        auth: ${POSTMARK_SPRING_MAIL_SMTP_AUTH:${SPRING_MAIL_SMTP_AUTH:true}}
        starttls-enable: ${POSTMARK_SPRING_MAIL_SMTP_STARTTLS_ENABLE:${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}}
        starttls-required: ${POSTMARK_SPRING_MAIL_SMTP_STARTTLS_REQUIRED:${SPRING_MAIL_SMTP_STARTTLS_REQUIRED:false}}
        ssl-enable: ${POSTMARK_SPRING_MAIL_SMTP_SSL_ENABLE:${SPRING_MAIL_SMTP_SSL_ENABLE:false}}
        connection-timeout-ms: ${POSTMARK_SPRING_MAIL_SMTP_CONNECTION_TIMEOUT_MS:${SPRING_MAIL_SMTP_CONNECTION_TIMEOUT_MS:30000}}
        timeout-ms: ${POSTMARK_SPRING_MAIL_SMTP_TIMEOUT_MS:${SPRING_MAIL_SMTP_TIMEOUT_MS:30000}}
        write-timeout-ms: ${POSTMARK_SPRING_MAIL_SMTP_WRITE_TIMEOUT_MS:${SPRING_MAIL_SMTP_WRITE_TIMEOUT_MS:30000}}
      mailgun:
        from-address: ${MAILGUN_APP_EMAIL_FROM_ADDRESS:${APP_EMAIL_FROM_ADDRESS:no-reply@example.com}}
        from-name: ${MAILGUN_APP_EMAIL_FROM_NAME:${APP_EMAIL_FROM_NAME:Interview Platform}}
        host: ${MAILGUN_SPRING_MAIL_HOST:}
        port: ${MAILGUN_SPRING_MAIL_PORT:587}
        username: ${MAILGUN_SPRING_MAIL_USERNAME:}
        password: ${MAILGUN_SPRING_MAIL_PASSWORD:}
        auth: ${MAILGUN_SPRING_MAIL_SMTP_AUTH:${SPRING_MAIL_SMTP_AUTH:true}}
        starttls-enable: ${MAILGUN_SPRING_MAIL_SMTP_STARTTLS_ENABLE:${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}}
        starttls-required: ${MAILGUN_SPRING_MAIL_SMTP_STARTTLS_REQUIRED:${SPRING_MAIL_SMTP_STARTTLS_REQUIRED:false}}
        ssl-enable: ${MAILGUN_SPRING_MAIL_SMTP_SSL_ENABLE:${SPRING_MAIL_SMTP_SSL_ENABLE:false}}
        connection-timeout-ms: ${MAILGUN_SPRING_MAIL_SMTP_CONNECTION_TIMEOUT_MS:${SPRING_MAIL_SMTP_CONNECTION_TIMEOUT_MS:30000}}
        timeout-ms: ${MAILGUN_SPRING_MAIL_SMTP_TIMEOUT_MS:${SPRING_MAIL_SMTP_TIMEOUT_MS:30000}}
        write-timeout-ms: ${MAILGUN_SPRING_MAIL_SMTP_WRITE_TIMEOUT_MS:${SPRING_MAIL_SMTP_WRITE_TIMEOUT_MS:30000}}
  public-origin: ${APP_PUBLIC_ORIGIN:http://localhost:3000}
  storage:
    root: ${APP_STORAGE_PATH:C:/Users/hpande/Documents/workspace/bindmount}

sandbox:
  base-url: ${SANDBOX_BASE_URL:http://localhost:8082/api}
  frontend-base-url: ${SANDBOX_FRONTEND_BASE_URL:http://localhost:8083/api}
  frontend-public-base-url: ${SANDBOX_FRONTEND_PUBLIC_BASE_URL:http://localhost:8083/api}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
