spring:
  application:
    name: java-compiler-backend
  datasource:
    # Default (local): file-based H2 on the Windows bind-mount path so data persists
    # Override via env var `H2_DB_PATH` if needed.
    url: jdbc:h2:file:${H2_DB_PATH:C:/Users/hpande/Documents/workspace/bindmount/interviewdb};AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  jackson:
    time-zone: UTC
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  web:
    cors:
      allowed-origins: "http://localhost:3000,http://localhost:8081"
      allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
      allowed-headers: "*"
      allow-credentials: true

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.altimetrik: INFO

app:
  storage:
    root: ${APP_STORAGE_PATH:C:/Users/hpande/Documents/workspace/bindmount}

sandbox:
  base-url: ${SANDBOX_BASE_URL:http://localhost:8082/api}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
